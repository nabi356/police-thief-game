<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Police vs Thief Grid Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="game-wrapper">

        <div id="hud">
            <h1>Police vs Thief [LIVE MULTIPLAYER]</h1>
            <div id="role-display" class="role">Connecting to Server...</div>
            <p id="instructions" class="instructions"></p>
        </div>
        
        <div id="canvas-container">
            <div id="login-modal" class="overlay">
                <h2>ENTER YOUR CODENAME</h2>
                <input type="text" id="username-input" placeholder="e.g. Officer John" maxlength="15" autocomplete="off" />
                <button id="btn-login" class="role-btn">ENTER CITY</button>
                <p id="login-error" style="color: #ff5555; text-shadow: 0 0 5px red; font-weight: bold; height: 20px; margin-top: 10px;"></p>
            </div>
            
            <div id="role-selection" class="overlay hidden">
                <h2>SELECT YOUR DISPATCH UNIT</h2>
                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <button id="btn-thief" class="role-btn thief-btn">Play as THIEF</button>
                    <button id="btn-chief" class="role-btn chief-btn">Play as POLICE CHIEF</button>
                </div>
                <p id="role-error" style="color: #ff5555; text-shadow: 0 0 5px red; font-weight: bold; height: 20px;"></p>
            </div>
            <canvas id="gridCanvas" width="600" height="600"></canvas>
            
            <div id="game-over" class="hidden overlay">
                <h2>BUSTED! POLICE WIN!</h2>
                <button onclick="socket.emit('restart_game')">Restart Game</button>
            </div>
        </div>
        <div style="margin-top: 15px; color:#555; text-align: center;">Open this page in a second tab to play both roles!</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
